<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="system-ui,-apple-system,sans-serif" font-size="13">
  <defs>
    <linearGradient id="cmsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="960" height="460" rx="12" fill="#0f172a"/>
  <text x="480" y="28" text-anchor="middle" fill="#94a3b8" font-size="11">MCP CMS — CONTENT + SOCIAL + VIDEO PLATFORM</text>

  <!-- Clients -->
  <rect x="20" y="120" width="130" height="160" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="85" y="140" text-anchor="middle" fill="#94a3b8" font-size="10">MCP CLIENTS</text>
  <rect x="30" y="155" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="169" text-anchor="middle" fill="#f1f5f9" font-size="9">Claude / Kiro</text>
  <rect x="30" y="180" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="194" text-anchor="middle" fill="#f1f5f9" font-size="9">Cursor / Codex</text>
  <rect x="30" y="205" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="219" text-anchor="middle" fill="#f1f5f9" font-size="9">Windsurf</text>

  <line x1="150" y1="200" x2="195" y2="200" stroke="#6366f1" stroke-width="2"/>
  <polygon points="195,195 205,200 195,205" fill="#6366f1"/>

  <!-- Server -->
  <rect x="205" y="45" width="340" height="380" rx="8" fill="url(#cmsGrad)" opacity="0.08" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="375" y="67" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">mcp-cms</text>
  <text x="375" y="83" text-anchor="middle" fill="#64748b" font-size="9">Rust · rmcp 1.7 · 26 tools · Multi-backend</text>

  <rect x="217" y="95" width="155" height="55" rx="4" fill="#1e293b"/>
  <text x="294" y="111" text-anchor="middle" fill="#a78bfa" font-size="9">CONTENT (6)</text>
  <text x="294" y="126" text-anchor="middle" fill="#64748b" font-size="8">list · get · create · update</text>
  <text x="294" y="138" text-anchor="middle" fill="#64748b" font-size="8">publish · unpublish</text>

  <rect x="378" y="95" width="155" height="55" rx="4" fill="#1e293b"/>
  <text x="455" y="111" text-anchor="middle" fill="#38bdf8" font-size="9">SOCIAL (5)</text>
  <text x="455" y="126" text-anchor="middle" fill="#64748b" font-size="8">accounts · schedule · metrics</text>
  <text x="455" y="138" text-anchor="middle" fill="#64748b" font-size="8">list scheduled · delete</text>

  <rect x="217" y="158" width="155" height="55" rx="4" fill="#1e293b"/>
  <text x="294" y="174" text-anchor="middle" fill="#f87171" font-size="9">VIDEO (5)</text>
  <text x="294" y="189" text-anchor="middle" fill="#64748b" font-size="8">list · get · upload</text>
  <text x="294" y="201" text-anchor="middle" fill="#64748b" font-size="8">update · analytics</text>

  <rect x="378" y="158" width="155" height="55" rx="4" fill="#1e293b"/>
  <text x="455" y="174" text-anchor="middle" fill="#34d399" font-size="9">MEDIA (3)</text>
  <text x="455" y="189" text-anchor="middle" fill="#64748b" font-size="8">list · upload · get</text>

  <rect x="217" y="221" width="155" height="45" rx="4" fill="#1e293b"/>
  <text x="294" y="237" text-anchor="middle" fill="#fbbf24" font-size="9">TAXONOMY + SEO (4)</text>
  <text x="294" y="252" text-anchor="middle" fill="#64748b" font-size="8">categories · SEO metadata</text>

  <rect x="378" y="221" width="155" height="45" rx="4" fill="#1e293b"/>
  <text x="455" y="237" text-anchor="middle" fill="#fb923c" font-size="9">WORKFLOW (3)</text>
  <text x="455" y="252" text-anchor="middle" fill="#64748b" font-size="8">calendar · review · status</text>

  <rect x="217" y="275" width="316" height="24" rx="4" fill="#1e293b" stroke="#f87171" stroke-width="0.5"/>
  <text x="375" y="291" text-anchor="middle" fill="#f87171" font-size="9">GOVERNANCE: publish/social = external_write · video upload = gated</text>

  <!-- Backends -->
  <rect x="590" y="60" width="330" height="360" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="755" y="82" text-anchor="middle" fill="#94a3b8" font-size="10">BACKENDS (multi-active)</text>

  <text x="610" y="108" fill="#a78bfa" font-size="9" font-weight="bold">Content:</text>
  <rect x="610" y="112" width="290" height="22" rx="3" fill="#334155"/>
  <text x="755" y="127" text-anchor="middle" fill="#f1f5f9" font-size="8">WordPress — WORDPRESS_URL + WORDPRESS_APP_PASSWORD</text>
  <rect x="610" y="138" width="290" height="22" rx="3" fill="#334155"/>
  <text x="755" y="153" text-anchor="middle" fill="#f1f5f9" font-size="8">Contentful — CONTENTFUL_SPACE_ID + CONTENTFUL_MANAGEMENT_TOKEN</text>
  <rect x="610" y="164" width="290" height="22" rx="3" fill="#334155"/>
  <text x="755" y="179" text-anchor="middle" fill="#f1f5f9" font-size="8">Custom API — CMS_API_URL + CMS_API_KEY</text>

  <text x="610" y="205" fill="#38bdf8" font-size="9" font-weight="bold">Social:</text>
  <rect x="610" y="209" width="290" height="22" rx="3" fill="#334155"/>
  <text x="755" y="224" text-anchor="middle" fill="#f1f5f9" font-size="8">Twitter/X — TWITTER_BEARER_TOKEN</text>
  <rect x="610" y="235" width="290" height="22" rx="3" fill="#334155"/>
  <text x="755" y="250" text-anchor="middle" fill="#f1f5f9" font-size="8">LinkedIn — LINKEDIN_ACCESS_TOKEN</text>
  <rect x="610" y="261" width="290" height="22" rx="3" fill="#334155"/>
  <text x="755" y="276" text-anchor="middle" fill="#f1f5f9" font-size="8">Meta (FB/IG) — META_ACCESS_TOKEN + META_PAGE_ID</text>

  <text x="610" y="302" fill="#f87171" font-size="9" font-weight="bold">Video:</text>
  <rect x="610" y="306" width="290" height="22" rx="3" fill="#334155"/>
  <text x="755" y="321" text-anchor="middle" fill="#f1f5f9" font-size="8">YouTube — YOUTUBE_OAUTH_TOKEN</text>

  <rect x="610" y="340" width="290" height="55" rx="4" fill="#0f172a" stroke="#475569"/>
  <text x="755" y="358" text-anchor="middle" fill="#94a3b8" font-size="8">Multiple backends active simultaneously</text>
  <text x="755" y="372" text-anchor="middle" fill="#64748b" font-size="8">WordPress for blog + YouTube for video + Twitter for social</text>
  <text x="755" y="386" text-anchor="middle" fill="#64748b" font-size="8">Or: Custom API handles everything</text>

  <text x="480" y="445" text-anchor="middle" fill="#475569" font-size="10">mcp-cms v1.0.0 · 26 tools · Content + Social + Video · Multi-backend · No data stored</text>
</svg>
